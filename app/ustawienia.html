<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ustawienia</title>
  <link rel="stylesheet" href="clock-styles.css" />
  <link rel="stylesheet" href="layout.css" />
  <style>
    /* ---- Settings panel ---- */
    .settings-panel {
      width: 80vw;
      display: flex;
      flex-direction: column;
      gap: clamp(20px, 3.5vmin, 36px);
    }

    .settings-section {
      display: flex;
      flex-direction: column;
      gap: clamp(10px, 1.5vmin, 16px);
    }

    .settings-section-label {
      color: #888;
      font-size: clamp(0.8rem, 1.5vmin, 1.2rem);
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding-bottom: clamp(8px, 1.2vmin, 12px);
      border-bottom: 1px solid #222;
    }

    .mode-toggles {
      display: flex;
      gap: clamp(8px, 1.5vmin, 16px);
      flex-wrap: wrap;
    }

    .mode-toggle {
      flex: 1;
      min-width: clamp(80px, 14vw, 160px);
      min-height: clamp(56px, 8vmin, 100px);
      background: #111;
      border: 2px solid #222;
      border-radius: clamp(10px, 1.5vmin, 16px);
      color: #888;
      font-size: clamp(0.75rem, 1.6vmin, 1.4rem);
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .mode-toggle:hover  { background: #222; color: #f0f0f0; }
    .mode-toggle.active { background: #2563eb; border-color: #2563eb; color: white; }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: clamp(52px, 7vmin, 80px);
      background: #111;
      border: 2px solid #222;
      border-radius: clamp(10px, 1.5vmin, 16px);
      padding: 0 clamp(16px, 3vmin, 36px);
    }

    .toggle-row span {
      color: #f0f0f0;
      font-size: clamp(1rem, 2.2vmin, 1.6rem);
      font-weight: 600;
    }

    /* Larger toggle switch on settings page */
    .toggle-row .toggle-switch {
      width: clamp(56px, 8vmin, 80px);
      height: clamp(30px, 4.4vmin, 44px);
    }
    .toggle-row .toggle-switch::after {
      width: clamp(22px, 3.6vmin, 36px);
      height: clamp(22px, 3.6vmin, 36px);
    }
    .toggle-row .toggle-switch.active {
      background: #2563eb;
    }
    .toggle-row .toggle-switch.active::after {
      left: calc(100% - clamp(22px, 3.6vmin, 36px) - 4px);
    }
  </style>
</head>
<body>

<div class="topbar">
  <a href="index.html" title="Wróć do menu">
    <svg class="icon-btn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
  </a>
  <div class="topbar-right">
    <button class="help-btn" id="helpBtn">?</button>
  </div>
</div>

<div class="feedback-bar" id="hintArea">Ustaw domyślne opcje dla trybu quizu i ustawiania godziny.</div>

<div class="clock-wrap" id="clockContainer"></div>

<div class="settings-panel">

  <div class="settings-section">
    <div class="settings-section-label">Tryb czasu</div>
    <div class="mode-toggles">
      <button class="mode-toggle active" data-mode="full">Pełne godziny</button>
      <button class="mode-toggle" data-mode="half">Połówki (30 min)</button>
      <button class="mode-toggle" data-mode="quarter">Kwadranse (15, 45 min)</button>
      <button class="mode-toggle" data-mode="five">Co 5 minut</button>
      <button class="mode-toggle" data-mode="any">Każda minuta</button>
    </div>
  </div>

  <div class="settings-section">
    <div class="settings-section-label">Cyfry na tarczy</div>
    <div class="mode-toggles">
      <button class="mode-toggle" data-numbers="arabic">Arabskie</button>
      <button class="mode-toggle" data-numbers="roman">Rzymskie</button>
      <button class="mode-toggle" data-numbers="none">Bez cyfr</button>
    </div>
  </div>

  <div class="settings-section">
    <div class="settings-section-label">Opcje</div>
    <div class="toggle-row">
      <span>Dźwięki</span>
      <div class="toggle-switch active" id="soundToggle"></div>
    </div>
    <div class="toggle-row">
      <span>Podpowiedź czasu</span>
      <div class="toggle-switch active" id="timeHintToggle"></div>
    </div>
    <div class="toggle-row">
      <span>Format 24-godzinny</span>
      <div class="toggle-switch" id="hourFormatToggle"></div>
    </div>
  </div>

</div>

<script src="clock-renderer.js"></script>
<script>
  // ==================== localStorage Keys ====================
  const STORAGE_KEYS = {
    activeModes: 'zegar_activeModes',
    soundEnabled: 'zegar_soundEnabled',
    showTimeHint: 'zegar_showTimeHint',
    numberStyle: 'zegar_numberStyle',
    hourFormat: 'zegar_hourFormat',
  };

  // ==================== Defaults ====================
  const DEFAULTS = {
    activeModes: ['full'],
    soundEnabled: true,
    showTimeHint: true,
    numberStyle: 'arabic',
    hourFormat: '12',
  };

  // ==================== Load Settings ====================
  function loadSettings() {
    return {
      activeModes: JSON.parse(localStorage.getItem(STORAGE_KEYS.activeModes)) || DEFAULTS.activeModes,
      soundEnabled: localStorage.getItem(STORAGE_KEYS.soundEnabled) !== 'false',
      showTimeHint: localStorage.getItem(STORAGE_KEYS.showTimeHint) !== 'false',
      numberStyle: localStorage.getItem(STORAGE_KEYS.numberStyle) || DEFAULTS.numberStyle,
      hourFormat: localStorage.getItem(STORAGE_KEYS.hourFormat) || DEFAULTS.hourFormat,
    };
  }

  // ==================== DOM References ====================
  const clockContainer = document.getElementById("clockContainer");
  const modeToggles = document.querySelectorAll('[data-mode]');
  const numberBtns = document.querySelectorAll('[data-numbers]');
  const soundToggle = document.getElementById('soundToggle');
  const timeHintToggle = document.getElementById('timeHintToggle');
  const hourFormatToggle = document.getElementById('hourFormatToggle');
  const helpBtn = document.getElementById('helpBtn');
  const hintArea = document.getElementById('hintArea');

  // ==================== Initialize Settings ====================
  const settings = loadSettings();

  // ==================== Initialize Clock ====================
  const clock = new ClockRenderer(clockContainer, {
    size: 'normal',
    interactive: true,
    showBrand: true,
    showDigital: true,
    showDate: true,
    showSecondHand: true,
    showBgControls: false,
  });

  // ==================== Apply Settings to UI ====================
  // Mode toggles
  modeToggles.forEach(btn => {
    btn.classList.toggle('active', settings.activeModes.includes(btn.dataset.mode));
  });

  // Number style buttons
  numberBtns.forEach(btn => {
    btn.classList.toggle('active', btn.dataset.numbers === settings.numberStyle);
  });
  clock.setNumberStyle(settings.numberStyle);

  // Toggle switches
  soundToggle.classList.toggle('active', settings.soundEnabled);
  timeHintToggle.classList.toggle('active', settings.showTimeHint);
  hourFormatToggle.classList.toggle('active', settings.hourFormat === '24');

  // ==================== Event Listeners ====================

  // Mode toggles (multi-select)
  modeToggles.forEach(btn => {
    btn.addEventListener('click', () => {
      btn.classList.toggle('active');
      const activeModes = Array.from(modeToggles)
        .filter(b => b.classList.contains('active'))
        .map(b => b.dataset.mode);
      // Ensure at least one mode is active
      if (activeModes.length === 0) {
        btn.classList.add('active');
        activeModes.push(btn.dataset.mode);
      }
      localStorage.setItem(STORAGE_KEYS.activeModes, JSON.stringify(activeModes));
    });
  });

  // Number style buttons (single-select)
  numberBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      numberBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const style = btn.dataset.numbers;
      localStorage.setItem(STORAGE_KEYS.numberStyle, style);
      clock.setNumberStyle(style);
    });
  });

  // Sound toggle
  soundToggle.addEventListener('click', () => {
    soundToggle.classList.toggle('active');
    const enabled = soundToggle.classList.contains('active');
    localStorage.setItem(STORAGE_KEYS.soundEnabled, enabled);
  });

  // Time hint toggle
  timeHintToggle.addEventListener('click', () => {
    timeHintToggle.classList.toggle('active');
    const enabled = timeHintToggle.classList.contains('active');
    localStorage.setItem(STORAGE_KEYS.showTimeHint, enabled);
  });

  // Hour format toggle
  hourFormatToggle.addEventListener('click', () => {
    hourFormatToggle.classList.toggle('active');
    const format = hourFormatToggle.classList.contains('active') ? '24' : '12';
    localStorage.setItem(STORAGE_KEYS.hourFormat, format);
  });

  // Help button
  helpBtn.addEventListener('click', () => {
    hintArea.classList.toggle('active');
    helpBtn.classList.toggle('active');
  });
</script>

<script src="transitions.js"></script>
</body>
</html>
