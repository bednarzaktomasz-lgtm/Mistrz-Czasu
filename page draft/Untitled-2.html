<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mistrz Czasu - Wielka Hybryda</title>
  <style>
    :root {
      --bg-dark: #121212;
      --card-bg: #1e1e1e;
      --accent: #bb86fc;
      --gold: #ffd700;
      --text-main: #e0e0e0;
      --text-dim: #a0a0a0;
      --locked: #333333;
      
      /* --- PARAMETRY UKŁADU --- */
      /* Rozmiar kafelka zwiększony dwukrotnie (z 140px na 280px) */
      --tile-size: 280px; 
      /* Odstęp między kafelkami */
      --tile-gap: 60px;
    }

    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      /* Zwiększona max-szerokość, aby pomieścić wielkie kafelki i pasek */
      max-width: 800px; 
    }

    /* Tabs - Sticky */
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      background: #252525;
      padding: 10px;
      border-radius: 16px;
      position: sticky;
      top: 10px;
      z-index: 100;
      box-shadow: 0 5px 20px rgba(0,0,0,0.5);
    }

    .tab-btn {
      flex: 1;
      padding: 15px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      border-radius: 10px;
      font-weight: bold;
      font-size: 1rem;
      transition: 0.3s;
    }

    .tab-btn.active {
      background: var(--accent);
      color: var(--bg-dark);
    }

    .view {
      display: none;
      animation: fadeIn 0.5s ease;
    }

    .view.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .section-title {
      text-align: center;
      margin-bottom: 40px;
      font-size: 2rem;
      color: var(--accent);
    }

    /* --- STYL KAFELKA (Zwiększony i z gwiazdkami) --- */
    .grid-item {
      width: var(--tile-size);
      aspect-ratio: 1; /* Idealny kwadrat */
      background: var(--card-bg);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      border: 4px solid transparent;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      transition: transform 0.2s, border-color 0.2s;
    }

    .grid-item.unlocked {
      border-color: var(--accent);
    }

    .grid-item.locked {
      background: var(--locked);
      opacity: 0.6;
    }

    /* Powiększone ikony dla wielkich kafelków */
    .grid-item .icon {
      font-size: 6rem; 
      margin-bottom: 15px;
    }

    /* Powiększone etykiety */
    .grid-item .label {
      font-size: 1.5rem;
      font-weight: bold;
      text-align: center;
      margin-bottom: 10px;
    }

    /* Styl gwiazdek */
    .grid-item .stars {
      color: var(--gold);
      font-size: 1.4rem;
      letter-spacing: 2px;
    }

    .lock-overlay {
      position: absolute;
      top: 15px;
      right: 15px;
      font-size: 1.5rem;
    }

    /* --- UKŁAD HYBRYDOWY --- */
    .hybrid-wrapper {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 60px; /* Odstęp między kolumną kafelków a linią */
      padding-bottom: 100px;
    }

    .tiles-column {
      display: flex;
      flex-direction: column;
      gap: var(--tile-gap);
    }

    /* Kontener dla pionowej linii */
    .line-column {
      width: 8px; /* Pogrubiona linia */
      /* Wysokość linii = suma wysokości kafelków i odstępów między nimi */
      height: calc((var(--tile-size) * 6) + (var(--tile-gap) * 5));
      position: relative;
      background: #333;
      border-radius: 4px;
      /* Wyrównanie góry linii do góry pierwszego kafelka */
      margin-top: 0; 
    }

    /* Wypełnienie postępu na linii */
    .line-progress {
      position: absolute;
      top: 0;
      width: 100%;
      background: var(--accent);
      /* Postęp do środka drugiego kafelka */
      height: calc(var(--tile-size) + var(--tile-gap) + (var(--tile-size) / 2));
      border-radius: 4px;
      box-shadow: 0 0 20px var(--accent);
      z-index: 1;
    }

    /* Punkty (kropki) na linii */
    .dot {
      position: absolute;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 28px; /* Powiększone kropki */
      height: 28px;
      background: var(--bg-dark);
      border: 6px solid #333;
      border-radius: 50%;
      z-index: 10;
      transition: 0.3s;
    }

    .dot.active {
      border-color: var(--accent);
      background: var(--accent);
      box-shadow: 0 0 15px var(--accent);
    }

    /* --- Dynamiczne pozycjonowanie kropek ---
       Wzór: top = (RozmiarKafelka / 2) + NumerKafelka * (RozmiarKafelka + Odstęp)
       NumerKafelka liczymy od 0.
    */
    
    /* Kropka 1 (Środek 1. kafelka) */
    .dot:nth-of-type(1) { top: calc(var(--tile-size) / 2); }
    
    /* Kropka 2 (Środek 2. kafelka) */
    .dot:nth-of-type(2) { top: calc((var(--tile-size) / 2) + (var(--tile-size) + var(--tile-gap)) * 1); }
    
    /* Kropka 3 ... */
    .dot:nth-of-type(3) { top: calc((var(--tile-size) / 2) + (var(--tile-size) + var(--tile-gap)) * 2); }
    
    /* Kropka 4 ... */
    .dot:nth-of-type(4) { top: calc((var(--tile-size) / 2) + (var(--tile-size) + var(--tile-gap)) * 3); }
    
    /* Kropka 5 ... */
    .dot:nth-of-type(5) { top: calc((var(--tile-size) / 2) + (var(--tile-size) + var(--tile-gap)) * 4); }
    
    /* Kropka 6 (Środek 6. kafelka) */
    .dot:nth-of-type(6) { top: calc((var(--tile-size) / 2) + (var(--tile-size) + var(--tile-gap)) * 5); }

  </style>
</head>
<body>

  <div class="container">
    <div class="tabs">
      <button class="tab-btn active">Tryb Hybrydowy (Wielki)</button>
    </div>

    <div id="v-hybrid" class="view active">
      <div class="section-title">Ścieżka Mistrza Czasu</div>
      
      <div class="hybrid-wrapper">
        
        <div class="tiles-column">
          
          <div class="grid-item unlocked">
            <div class="icon">⏰</div>
            <div class="label">Godziny</div>
            <div class="stars">⭐⭐⭐</div>
          </div>
          
          <div class="grid-item unlocked">
            <div class="icon">⏳</div>
            <div class="label">Kwadranse</div>
            <div class="stars">⭐✩✩</div>
          </div>
          
          <div class="grid-item locked">
            <div class="lock-overlay">🔒</div>
            <div class="icon">🧭</div>
            <div class="label">Wpół do</div>
            <div class="stars">✩✩✩</div>
          </div>
          
          <div class="grid-item locked">
            <div class="lock-overlay">🔒</div>
            <div class="icon">🏛️</div>
            <div class="label">Rzymskie</div>
            <div class="stars">✩✩✩</div>
          </div>
          
          <div class="grid-item locked">
            <div class="lock-overlay">🔒</div>
            <div class="icon">📅</div>
            <div class="label">System 24h</div>
            <div class="stars">✩✩✩</div>
          </div>
          
          <div class="grid-item locked">
            <div class="lock-overlay">🔒</div>
            <div class="icon">🏆</div>
            <div class="label">Finał</div>
            <div class="stars">✩✩✩</div>
          </div>
          
        </div>

        <div class="line-column">
          <div class="line-progress"></div>
          
          <div class="dot active"></div> <div class="dot active"></div> <div class="dot"></div>        <div class="dot"></div>        <div class="dot"></div>        <div class="dot"></div>        </div>
        
      </div>
    </div>

  </div>

</body>
</html>
